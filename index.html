<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Gate</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        .container {
            background-color: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ff4757;
        }

        #errorMsg {
            color: #ff6b6b;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="passwordContainer">
        <h1>Enter Password</h1>
        <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter'){checkPassword()}">
        <button onclick="checkPassword()">Enter</button>
        <p id="errorMsg"></p>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <h1>Welcome!</h1>
        <p>This is your main content. You can put anything here.</p>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            const correctPassword = "AssaultRifleBwai"; // <-- updated password
            const errorMsg = document.getElementById('errorMsg');

            if(password === correctPassword) {
                // Hide password container and show main content
                document.getElementById('passwordContainer').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                errorMsg.textContent = "Incorrect password. Try again!";
            }
        }
    </script>
</body>
</html>
