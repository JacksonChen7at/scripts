<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Site</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* ✅ CONTAINER: start at 0 glow, animate on load, glow more on hover */
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;

    /* center the page vertically & horizontally */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    max-width: 600px; /* bigger width */
    width: 80%;       /* fill most of screen */
    padding: 40px;    /* bigger padding for size */
    border-radius: 10px;
    text-align: center;

    /* keep your glow / hover untouched */
    box-shadow: 0 0 0px #fff;
    transition: box-shadow 0.4s ease;
}

.container {
    box-shadow: 0 0 0px #fff;
}

.container:hover {
    box-shadow: 0 0 30px #fff;
}

input {
    padding: 10px;
    width: 80%;
    margin-bottom: 20px;
    border-radius: 5px;
    border: 1px solid #fff;
    background: #000;
    color: #fff;
}

button {
    padding: 10px 20px;
    border: 1px solid #fff;
    background: #000;
    color: #fff;
    cursor: pointer;
}

button:hover {
    background: #fff;
    color: #000;
}

h2 {
    margin-top: 25px;
    border-bottom: 1px solid #fff;
    padding-bottom: 5px;
}

.copy-box {
    background: #000;
    border: 1px solid #fff;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.copy-box:hover {
    background: #fff;
    color: #000;
    box-shadow: 0 0 20px #fff;
}

.copy-box:active {
    transform: scale(0.95);
}

#errorMsg {
    color: #ccc;
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div class="container" id="passwordContainer">
    <h1>Enter Password</h1>
    <input type="password" id="passwordInput" placeholder="Password"
        onkeydown="if(event.key==='Enter'){checkPassword()}">
    <button onclick="checkPassword()">Enter</button>
    <p id="errorMsg"></p>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent" style="display:none;">
    <h1>Welcome Back!</h1>

    <h2>Xeno</h2>
    <div class="copy-box" ondblclick="copyText(this)" data-text="https://wrdcdn.net/r/214685/1772008617896/Xeno-v1.3.25b2.exe">
        Xeno Download Link
    </div>

    <h2>Guide</h2>
    <div class="copy-box" ondblclick="goToTutorial()">
        Tutorial
    </div>
</div>

<script>
function checkPassword() {
    const password = document.getElementById('passwordInput').value;
    if(password === "AssaultRifleBwai") {
        sessionStorage.setItem("loggedIn", "true");

        document.getElementById('passwordContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        // retrigger glow animation on mainContent
        const content = document.getElementById('mainContent');
        content.style.animation = "none";
        setTimeout(() => {
            content.style.animation = "glowIn 1.5s ease forwards";
        }, 10);
    } else {
        document.getElementById('errorMsg').textContent = "Incorrect password.";
    }
}

// auto login if session
document.addEventListener("DOMContentLoaded", function() {
    if(sessionStorage.getItem("loggedIn") === "true") {
        document.getElementById('passwordContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        // retrigger glow on load
        const content = document.getElementById('mainContent');
        content.style.animation = "none";
        setTimeout(() => {
            content.style.animation = "glowIn 1.5s ease forwards";
        }, 10);
    }
});

function copyText(element) {
    navigator.clipboard.writeText(element.dataset.text);
}

function goToTutorial() {
    window.location.href = "tutorial.html";
}
</script>

</body>
</html>
