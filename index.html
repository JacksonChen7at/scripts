<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Site</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    width: 80%;
    max-width: 600px;
}

input {
    padding: 10px;
    width: 80%;
    margin-bottom: 20px;
    border-radius: 5px;
    border: 1px solid #fff;
    background: #000;
    color: #fff;
}

button {
    padding: 10px 20px;
    border: 1px solid #fff;
    background: #000;
    color: #fff;
    cursor: pointer;
}

button:hover {
    background: #fff;
    color: #000;
}

h2 {
    margin-top: 25px;
    border-bottom: 1px solid #fff;
    padding-bottom: 5px;
}

/* COPY BOX STYLE */
.copy-box {
    background: #000;
    border: 1px solid #fff;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

.copy-box:hover {
    background: #fff;
    color: #000;
}

#errorMsg {
    color: #ccc;
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div class="container" id="passwordContainer">
    <h1>Enter Password</h1>
    <input type="password" id="passwordInput" placeholder="Password"
        onkeydown="if(event.key==='Enter'){checkPassword()}">
    <button onclick="checkPassword()">Enter</button>
    <p id="errorMsg"></p>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent" style="display:none;">
    <h1>Welcome Back!</h1>

    <h2>Xeno</h2>
    <div class="copy-box" ondblclick="copyText(this)" 
    data-text="https://wrdcdn.net/r/214685/1772008617896/Xeno-v1.3.25b2.exe">
        Xeno (double-click to copy)
    </div>

    <h2>Rivals</h2>

    <div class="copy-box" ondblclick="copyText(this)" 
    data-text="https://github.com/EndOverdosing/Soluna-API/blob/main/rivals-modern.lua">
        Soluna (double-click to copy)
    </div>

    <div class="copy-box" ondblclick="copyText(this)" 
    data-text="loadstring(game:HttpGet(&quot;https://raw.githubusercontent.com/awakeningswifters/LexusHubLoader/refs/heads/main/Loader.lua&quot;))()">
        LexusHub (double-click to copy)
    </div>

    <div class="copy-box" ondblclick="copyText(this)" 
    data-text="loadstring(game:HttpGet(&quot;https://rawscripts.net/raw/Universal-Script-addon-for-kiciahook-dules-rivals-126928&quot;))()">
        Addons (double-click to copy)
    </div>

    <h2>Blox Fruits</h2>

    <div class="copy-box" ondblclick="copyText(this)" 
    data-text="loadstring(game:HttpGet(&quot;https://rawscripts.net/raw/Universal-Script-Nubla-X-138734&quot;))()">
        Nubla (double-click to copy)
    </div>

    <div class="copy-box" ondblclick="copyText(this)" 
    data-text="loadstring(game:HttpGet(&quot;https://raw.githubusercontent.com/giahuy2511-coder/MonsterHub/refs/heads/main/MonsterHubEN&quot;))()">
        MonsterHub (double-click to copy)
    </div>
<h2>Guide</h2>
<div class="copy-box" ondblclick="goToTutorial()">
    Tutorial (double-click to open)
</div>

<script>
function checkPassword() {
    const password = document.getElementById('passwordInput').value;
    const correctPassword = "AssaultRifleBwai";
    const errorMsg = document.getElementById('errorMsg');

    if(password === correctPassword) {
        // SAVE that user is logged in
        localStorage.setItem("loggedIn", "true");

        document.getElementById('passwordContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    } else {
        errorMsg.textContent = "Incorrect password.";
    }
}

// Auto-skip password if already entered
window.onload = function() {
    if(localStorage.getItem("loggedIn") === "true") {
        document.getElementById('passwordContainer').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    }
}

function copyText(element) {
    const text = element.getAttribute('data-text');

    navigator.clipboard.writeText(text).then(() => {
        const original = element.textContent;
        element.textContent = "Copied! ✅";

        setTimeout(() => {
            element.textContent = original;
        }, 1500);
    });
}
function goToTutorial() {
    window.location.href = "tutorial.html";
}
</script>

</body>
</html>
